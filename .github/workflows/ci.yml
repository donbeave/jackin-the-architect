name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jackin-project/jackin-role-action@f59949f92906655d2c5a1a6747390d4d49b0b9cd # latest
        with:
          jackin-version: latest-build
          build-platforms: linux/amd64