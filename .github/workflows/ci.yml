name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jackin-project/jackin-role-action@95a8419d399c67b023af53e2864ed7ea417261d1 # latest
        with:
          jackin-version: latest-build
          build-platforms: linux/amd64
