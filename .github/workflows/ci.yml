name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: jackin-project/jackin-role-action@95a8419d399c67b023af53e2864ed7ea417261d1 # latest
        with:
          jackin-version: latest-build
          build-platforms: linux/amd64
