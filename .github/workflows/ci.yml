name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jackin-project/jackin-role-action@52d27d9b1af0d1a6061ebb20e2d260053081f16d # latest
        with:
          jackin-version: latest-build
