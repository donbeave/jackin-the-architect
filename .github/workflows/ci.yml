name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: jackin-project/jackin-role-action@66de3e5c5165e708ab6b09c9496459a662b4b63c # latest
        with:
          jackin-version: latest-build
          build-platforms: linux/amd64
