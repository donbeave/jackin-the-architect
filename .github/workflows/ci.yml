name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: jackin-project/validate-agent-action@c23323b7222d1aab5ec2a70285e1fbcfd66ba6ca # latest
        with:
          jackin-version: latest-build
          build-platforms: linux/amd64
