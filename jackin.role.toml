dockerfile = "Dockerfile"
published_image = "docker.io/projectjackin/jackin-the-architect:latest"
agents = ["claude", "codex"]

[identity]
name = "The Architect"

[env.CLAUDE_CODE_NO_FLICKER]
default = "1"

[claude]
plugins = [
  "code-review@claude-plugins-official",
  "code-simplifier@claude-plugins-official",
  "feature-dev@claude-plugins-official",
  "commit-commands@claude-plugins-official",
  "github@claude-plugins-official",
  "claude-md-management@claude-plugins-official",
  "security-guidance@claude-plugins-official",
  "pr-review-toolkit@claude-plugins-official",
  "rust-analyzer-lsp@claude-plugins-official",
  "jackin-dev@jackin-marketplace",
  "rust-best-practices@tailrocks-marketplace",
  "caveman@caveman",
]

[[claude.marketplaces]]
source = "jackin-project/jackin-marketplace"

[[claude.marketplaces]]
source = "tailrocks/tailrocks-marketplace"

[[claude.marketplaces]]
source = "JuliusBrussee/caveman"

[codex]
